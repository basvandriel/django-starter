name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Run Django system checks
        run: uv run python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: mysite.settings

      - name: Run migrations
        run: uv run python manage.py migrate --run-syncdb
        env:
          DJANGO_SETTINGS_MODULE: mysite.settings

      - name: Run tests
        run: uv run python manage.py test
        env:
          DJANGO_SETTINGS_MODULE: mysite.settings

  docker:
    name: docker build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t django-starter:ci .

      - name: Run Django tests inside container
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=mysite.settings \
            django-starter:ci \
            python manage.py test --verbosity=2

      - name: Run Django system checks inside container
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=mysite.settings \
            django-starter:ci \
            python manage.py check
